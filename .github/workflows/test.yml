# Fork CI: type-check the TypeScript (.mts) source. Replaces the upstream
# build/test/analyze pipeline, whose Docker-based `npm run test-metrics` ran
# ~200 sequential Puppeteer renders and hit the 6h job timeout, and whose
# CodeQL step lacked permissions in a fork. Runtime is verified separately by
# build-docker.yml (it builds the image this fork ships).
name: CI

on:
  # Type-check every working branch on push (not just main), and every PR to main.
  push:
    branches:
      - '**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 26
      - name: Install dependencies
        run: npm ci
        env:
          # tsc only needs the dependency type definitions, not a real browser.
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      - name: Type-check (tsc --noEmit)
        run: npm run typecheck
