# Build the metrics image and publish it to this fork's GitHub Container Registry,
# so workflows that consume the action can pull a pre-built image instead of rebuilding
# it from the Dockerfile on every run. See action.yml (forked path) for the pull logic.
#
# The Dockerfile layers this fork's source on top of the upstream pre-built image, so
# the build is now trivial (a base pull + a source COPY) and finishes in seconds. The
# timeout below is a guardrail against the multi-hour hangs the from-scratch build hit.
name: Build and publish Docker image

on:
  push:
    branches:
      - master
      - fix/languages-color-fallback
    paths:
      - Dockerfile
      - package.json
      - package-lock.json
      - source/**
      - .github/workflows/build-docker.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# A newer push to the same branch supersedes an in-flight build.
concurrency:
  group: build-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          TAG=$(echo '${{ github.ref_name }}' | sed 's@[^a-zA-Z0-9._-]@-@g')
          SHA=sha-$(echo '${{ github.sha }}' | cut -c1-7)
          echo "Building $IMAGE:$TAG ($IMAGE:$SHA)"
          docker build -t "$IMAGE:$TAG" -t "$IMAGE:$SHA" .
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:$SHA"
