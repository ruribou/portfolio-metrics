# Fork CI for TypeScript development: format, lint, and type-check the .ts
# sources on every PR to main (and on main itself post-merge). It's a public
# repo, so each check runs as its own job for clear, independent signal.
#
# Role: this is the WORK-BRANCH / PR quality gate. It only validates (static
# checks; the build dryrun runs the whole .ts import graph through tsx) and
# never publishes anything. Releasing the runtime image is build-docker.yml's
# job, which runs only on main and version tags.
#
# The upstream Docker render test (~200 sequential Puppeteer renders, 6h job
# timeout) and CodeQL are intentionally NOT here. The runtime image is built and
# verified separately by build-docker.yml.
name: CI

on:
  # pull_request fires for both internal and fork PRs, so this single trigger
  # is the full pre-merge gate for every contribution. push is scoped to main
  # only (post-merge sanity); triggering on work-branch pushes too would just
  # double-run the same commit a PR already covers (and leave a noisy cancelled
  # run). Open a (draft) PR to get CI on a work branch.
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    name: Type-check (tsc)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          # The static checks don't need a real browser.
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      - name: Type-check
        run: npm run typecheck

  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      - name: Lint
        run: npm run lint

  format:
    name: Format (prettier)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      - name: Check formatting
        run: npm run format:check

  build:
    name: Build (docs/metadata generation)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      # Runs the whole .ts source through the tsx loader (dryrun, no commits):
      # if any module fails to import/transpile, this fails.
      - name: Build (dryrun)
        run: npm run build
