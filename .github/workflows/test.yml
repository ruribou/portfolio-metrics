# Fork CI for TypeScript development: format, lint, and type-check the .mts
# sources on every push and on PRs to main. It's a public repo, so each check
# runs as its own job for clear, independent signal.
#
# The upstream Docker render test (~200 sequential Puppeteer renders, 6h job
# timeout) and CodeQL are intentionally NOT here. The runtime image is built and
# verified separately by build-docker.yml.
name: CI

on:
  # Check every working branch on push (not just main), and every PR to main.
  push:
    branches:
      - "**"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    name: Type-check (tsc)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          # The static checks don't need a real browser.
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      - name: Type-check
        run: npm run typecheck

  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      - name: Lint
        run: npm run lint

  format:
    name: Format (prettier)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      - name: Check formatting
        run: npm run format:check
