# Build the metrics image once and publish it to this fork's GitHub Container Registry,
# so workflows that consume the action can pull a pre-built image instead of rebuilding
# it from the Dockerfile on every run. See action.yml (forked path) for the pull logic.
name: Build and publish Docker image

on:
  push:
    branches:
      - master
      - fix/languages-color-fallback
    paths:
      - Dockerfile
      - package.json
      - package-lock.json
      - source/**
      - .github/workflows/build-docker.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # Tag by branch name (e.g. master, fix-languages-color-fallback) so consumers
          # pulling `@<ref>` get the matching image, plus a short-sha tag for traceability.
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
