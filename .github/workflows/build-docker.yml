# Build the metrics image once and publish it to this fork's GitHub Container Registry,
# so workflows that consume the action can pull a pre-built image instead of rebuilding
# it from the Dockerfile on every run. See action.yml (forked path) for the pull logic.
#
# NOTE: uses a plain `docker build` (dockerd's built-in BuildKit) on purpose. A buildx
# docker-container builder stalls for tens of minutes on this heavy Chrome-based image,
# whereas the plain build completes in ~8 minutes.
name: Build and publish Docker image

on:
  push:
    branches:
      - master
      - fix/languages-color-fallback
    paths:
      - Dockerfile
      - package.json
      - package-lock.json
      - source/**
      - .github/workflows/build-docker.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          TAG=$(echo '${{ github.ref_name }}' | sed 's@[^a-zA-Z0-9._-]@-@g')
          SHA=sha-$(echo '${{ github.sha }}' | cut -c1-7)
          echo "Building $IMAGE:$TAG ($IMAGE:$SHA)"
          docker build -t "$IMAGE:$TAG" -t "$IMAGE:$SHA" .
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:$SHA"
