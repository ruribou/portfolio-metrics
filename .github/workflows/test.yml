# Fork CI for TypeScript development: format, lint, and type-check the .ts
# sources on every push and on PRs to main. It's a public repo, so each check
# runs as its own job for clear, independent signal.
#
# Role: this is the WORK-BRANCH / PR quality gate. It only validates (static
# checks + a boot smoke) and never publishes anything. Releasing the runtime
# image is build-docker.yml's job, which runs only on main and version tags.
#
# The upstream Docker render test (~200 sequential Puppeteer renders, 6h job
# timeout) and CodeQL are intentionally NOT here. The runtime image is built and
# verified separately by build-docker.yml.
name: CI

on:
  # Two triggers are both required and serve different audiences:
  #   - push to any branch: gives internal work branches a signal before a PR
  #     exists. (push does NOT fire for PRs opened from forks.)
  #   - pull_request to main: the only way external (fork) contributions get CI.
  # For an internal branch that already has a PR open, both fire on the same
  # commit; the concurrency group below collapses them into a single run.
  push:
    branches:
      - "**"
  pull_request:
    branches: [main]
  workflow_dispatch:

# Dedupe the push + pull_request double-run: a push to branch X (ref_name=X) and
# a PR whose head is X (head_ref=X) share group "ci-X", so cancel-in-progress
# leaves just one run. Fork PRs (no push event) simply run once.
concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type-check (tsc)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          # The static checks don't need a real browser.
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      - name: Type-check
        run: npm run typecheck

  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      - name: Lint
        run: npm run lint

  format:
    name: Format (prettier)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      - name: Check formatting
        run: npm run format:check

  build:
    name: Build (docs/metadata generation)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      # Runs the whole .ts source through the tsx loader (dryrun, no commits):
      # if any module fails to import/transpile, this fails.
      - name: Build (dryrun)
        run: npm run build

  boot:
    name: Boot smoke (web instance starts under tsx)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      # End-to-end check that the renamed .ts/ESM import graph resolves at
      # runtime: boot the web instance in mocked SANDBOX mode and wait until it
      # reports "Server ready" (no browser render needed, so no Chromium).
      - name: Boot web instance
        env:
          SANDBOX: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
        run: |
          node --import tsx source/app/web/index.ts > web.log 2>&1 &
          PID=$!
          for i in $(seq 1 60); do
            if grep -q "Server ready" web.log; then
              echo "::notice::web instance booted under tsx"
              kill "$PID" 2>/dev/null || true
              exit 0
            fi
            if grep -qiE "throw|unhandled|cannot find|err_module" web.log; then
              echo "::error::web instance failed to boot"; cat web.log
              kill "$PID" 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done
          echo "::error::timed out waiting for 'Server ready'"; cat web.log
          kill "$PID" 2>/dev/null || true
          exit 1
